<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSA Analyzer v39 - Clear Brightness</title>
    <style>
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }
        body { 
            background: #000; color: #eee; font-family: sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; touch-action: none; 
        }
        #header { background: #1a1a1a; width: 100%; padding: 5px 0; text-align: center; border-bottom: 1px solid #333; z-index: 100; flex-shrink: 0; }
        .top-info { width: 95%; background: rgba(30, 30, 30, 0.9); padding: 8px; border-radius: 8px; margin: 5px 0; display: flex; flex-direction: column; gap: 5px; z-index: 100; border: 1px solid #444; flex-shrink: 0; }
        #stage { position: relative; background: #111; width: 100vw; flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 10px; }
        canvas { display: block; image-rendering: -webkit-optimize-contrast; } /* 画像のキレを良くする */

        .slider-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #ccc; }
        input[type="range"] { flex: 1; accent-color: #adff2f; height: 30px; }
        .step-btn { width: 40px; height: 35px; background: #444; color: #adff2f; border: 1px solid #666; border-radius: 6px; font-weight: bold; font-size: 18px; }
        .val-disp { min-width: 45px; text-align: right; color: #adff2f; font-family: monospace; font-size: 12px; }
        
        .res-row { display: flex; gap: 8px; }
        .res-mini { flex: 1; background: #1f1f1f; padding: 5px; border-radius: 6px; text-align: center; border: 1px solid #444; transition: all 0.2s; }
        .pct-val { font-size: 18px; font-weight: bold; color: #00e5ff; }

        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .is-perfect {
            background: linear-gradient(270deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff, #8000ff, #ff00ff);
            background-size: 400% 400%;
            animation: rainbow-bg 3s ease infinite;
            border: 1px solid #fff !important;
        }
        .is-perfect .pct-val, .is-perfect span { color: #fff !important; text-shadow: 1px 1px 2px #000; }

        #ctrl_container { position: fixed; bottom: 20px; right: 15px; z-index: 200; display: grid; grid-template-areas: ". up ." "left center right" ". down ."; gap: 8px; pointer-events: none; }
        #ctrl_container button { pointer-events: auto; width: 55px; height: 55px; background: rgba(51, 51, 51, 0.95); color: white; border: 1px solid #666; border-radius: 12px; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-center { grid-area: center; background: rgba(173, 255, 47, 0.1) !important; border: 2px solid #adff2f !important; color: #adff2f; font-size: 10px; }
        .mode-active { border-color: #00e5ff !important; color: #00e5ff !important; background: rgba(0, 229, 255, 0.2) !important; }
        #drop_area { width: 90%; height: 35px; border: 1px dashed #adff2f; line-height: 35px; text-align: center; border-radius: 8px; font-size: 13px; margin: 5px auto; cursor: pointer; color: #adff2f; }
    </style>
</head>
<body>

<div id="header">
    <div id="active_indicator" style="color:#adff2f; font-size:12px; font-weight:bold;">画像を読み込んでください</div>
    <div id="drop_area" onclick="document.getElementById('file_input').click()">＋ 画像を選択</div>
    <input type="file" id="file_input" style="display:none" accept="image/*">
</div>

<div class="top-info">
    <div class="slider-row">
        <span>明るさ</span>
        <input type="range" id="bright_slider" min="0.5" max="3.0" step="0.1" value="1.0">
        <span class="val-disp" id="bright_val">100%</span>
    </div>
    <div class="slider-row">
        <span>傾き</span>
        <button class="step-btn" onclick="stepRotate(-0.1)">◀</button>
        <input type="range" id="rotate_slider" min="-5" max="5" step="0.1" value="0">
        <button class="step-btn" onclick="stepRotate(0.1)">▶</button>
        <span class="val-disp" id="rotate_val">0.0°</span>
    </div>
    <div class="res-row">
        <div class="res-mini" id="tab_lr"><span>左右 </span><span class="pct-val" id="p_lr">--:--</span></div>
        <div class="res-mini" id="tab_tb"><span>上下 </span><span class="pct-val" id="p_tb">--:--</span></div>
    </div>
</div>

<div id="stage"><canvas id="cvs"></canvas></div>

<div id="ctrl_container">
    <button style="grid-area: up" onpointerdown="doMove(-1)">▲</button>
    <button style="grid-area: left" onpointerdown="doMove(-1)">◀</button>
    <button id="mode_btn" class="btn-center"><span id="mode_txt" style="font-size:14px; font-weight:bold;">1px</span><span>DRAG</span></button>
    <button style="grid-area: right" onpointerdown="doMove(1)">▶</button>
    <button style="grid-area: down" onpointerdown="doMove(1)">▼</button>
</div>

<script>
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
    const bSlider = document.getElementById('bright_slider'), rSlider = document.getElementById('rotate_slider');
    const bDisp = document.getElementById('bright_val'), rDisp = document.getElementById('rotate_val');
    const stage = document.getElementById('stage'), tabLR = document.getElementById('tab_lr'), tabTB = document.getElementById('tab_tb');
    
    let img = new Image();
    let lines = { out_l:0, out_r:0, out_t:0, out_b:0, in_l:0, in_r:0, in_t:0, in_b:0 };
    const labelMap = { out_l:"外枠：左", out_r:"外枠：右", out_t:"外枠：上", out_b:"外枠：下", in_l:"絵：左", in_r:"絵：右", in_t:"絵：上", in_b:"絵：下" };
    let activeKey = 'in_l', isDrag = false, isFastMode = false;
    let blinkValue = 0, blinkDir = 1;

    const ctrl = document.getElementById('ctrl_container'), modeBtn = document.getElementById('mode_btn');
    let isMovingCtrl = false, moveStartTime = 0, hasMoved = false;

    modeBtn.addEventListener('pointerdown', (e) => { isMovingCtrl = true; moveStartTime = Date.now(); hasMoved = false; e.preventDefault(); });
    window.addEventListener('pointermove', (e) => {
        if (isMovingCtrl) { hasMoved = true; ctrl.style.left = (e.clientX - 90) + 'px'; ctrl.style.top = (e.clientY - 90) + 'px'; ctrl.style.bottom = 'auto'; ctrl.style.right = 'auto'; }
        if (isDrag) { const p = getPos(e); lines[activeKey] = activeKey.match(/_l|_r/) ? p.x : p.y; }
    });
    window.addEventListener('pointerup', () => { if (isMovingCtrl && (!hasMoved || (Date.now() - moveStartTime < 200))) toggleMode(); isMovingCtrl = false; isDrag = false; });

    const updateFilters = () => { 
        bDisp.innerText = Math.round(bSlider.value * 100) + "%"; 
        rDisp.innerText = parseFloat(rSlider.value).toFixed(1) + "°"; 
    };
    window.stepRotate = (val) => { rSlider.value = (parseFloat(rSlider.value) + val).toFixed(1); updateFilters(); };
    bSlider.oninput = updateFilters; rSlider.oninput = updateFilters;

    document.getElementById('file_input').onchange = e => {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader(); r.onload = ev => { img.src = ev.target.result; rSlider.value = 0; bSlider.value = 1.0; updateFilters(); }; r.readAsDataURL(file);
    };

    img.onload = () => { resizeCanvas(); };
    function resizeCanvas() {
        if(!img.src) return;
        const padding = 20;
        const stageW = stage.clientWidth - padding, stageH = stage.clientHeight - padding;
        const imgRatio = img.width / img.height, stageRatio = stageW / stageH;
        let finalW, finalH;
        if (imgRatio > stageRatio) { finalW = stageW; finalH = stageW / imgRatio; }
        else { finalH = stageH; finalW = stageH * imgRatio; }
        cvs.width = finalW; cvs.height = finalH;
        lines = { out_l:5, out_r:finalW-5, out_t:5, out_b:finalH-5, in_l:finalW*0.15, in_r:finalW*0.85, in_t:finalH*0.15, in_b:finalH*0.85 };
    }
    window.addEventListener('resize', resizeCanvas);

    setInterval(draw, 30);

    function toggleMode() { isFastMode = !isFastMode; document.getElementById('mode_txt').innerText = isFastMode ? "10px" : "1px"; modeBtn.classList.toggle('mode-active', isFastMode); }
    function doMove(dir) { if(!activeKey) return; lines[activeKey] += (dir * (isFastMode ? 10 : 1)); }

    function draw() {
        if(!img.src) return;
        blinkValue += 0.05 * blinkDir; if(blinkValue > 1 || blinkValue < 0) blinkDir *= -1;
        
        ctx.save();
        // 背景を完全にクリア
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        
        // ★描画設定の完全クリーンアップ
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1.0;
        
        // 明るさスライダーが100%以外のときだけフィルタ適用
        if(Math.abs(bSlider.value - 1.0) > 0.01) {
            ctx.filter = `brightness(${bSlider.value})`;
        } else {
            ctx.filter = 'none';
        }
        
        ctx.translate(cvs.width/2, cvs.height/2);
        ctx.rotate(rSlider.value * Math.PI / 180);
        ctx.drawImage(img, -cvs.width/2, -cvs.height/2, cvs.width, cvs.height);
        
        ctx.filter = 'none';
        ctx.restore();

        // 線描画
        Object.keys(lines).forEach(key => {
            const val = lines[key], isActive = (key === activeKey);
            ctx.beginPath(); ctx.setLineDash([15, 10]);
            ctx.strokeStyle = key.startsWith('out') ? '#00e5ff' : '#adff2f';
            ctx.lineWidth = isActive ? 4 : 1.2;
            ctx.globalAlpha = isActive ? 0.4 + (blinkValue * 0.6) : 0.6;
            if(key.endsWith('_l') || key.endsWith('_r')) { ctx.moveTo(val, 0); ctx.lineTo(val, cvs.height); }
            else { ctx.moveTo(0, val); ctx.lineTo(cvs.width, val); }
            ctx.stroke();
        });
        calc();
    }

    function calc() {
        const l = Math.abs(lines.in_l - lines.out_l), r = Math.abs(lines.out_r - lines.in_r);
        const t = Math.abs(lines.in_t - lines.out_t), b = Math.abs(lines.out_b - lines.in_b);
        const lp = Math.round(l/(l+r)*100)||50, tp = Math.round(t/(t+b)*100)||50;
        document.getElementById('p_lr').innerText = `${lp}:${100-lp}`;
        document.getElementById('p_tb').innerText = `${tp}:${100-tp}`;
        
        if (lp >= 45 && lp <= 55) tabLR.classList.add('is-perfect'); else tabLR.classList.remove('is-perfect');
        if (tp >= 45 && tp <= 55) tabTB.classList.add('is-perfect'); else tabTB.classList.remove('is-perfect');
        document.getElementById('active_indicator').innerText = "調整中：" + labelMap[activeKey];
    }
    function getPos(e) { const rect = cvs.getBoundingClientRect(); return { x: e.clientX - rect.left, y: e.clientY - rect.top }; }
    cvs.addEventListener('pointerdown', e => {
        const p = getPos(e); let minDist = 30, found = null;
        Object.keys(lines).forEach(key => {
            const val = lines[key]; const dist = key.match(/_l|_r/) ? Math.abs(p.x - val) : Math.abs(p.y - val);
            if(dist < minDist) { minDist = dist; found = key; }
        });
        if(found) { activeKey = found; isDrag = true; }
        e.preventDefault();
    });
</script>
</body>
</html>
