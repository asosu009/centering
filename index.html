<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSA Analyzer v21</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; touch-action: manipulation; }
        #header { background: #1a1a1a; width: 100%; padding: 5px 0; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        
        #stage { position: relative; background: #000; width: 100vw; overflow: hidden; display: flex; justify-content: center; }
        canvas { display: block; width: 100%; height: auto; }

        /* スライダーと結果表示（上部に集約） */
        .top-info { width: 95%; background: rgba(30, 30, 30, 0.8); padding: 5px; border-radius: 8px; margin: 5px 0; display: flex; flex-direction: column; gap: 5px; }
        .slider-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        input[type="range"] { flex: 1; accent-color: #adff2f; }
        .res-row { display: flex; gap: 5px; }
        .res-mini { flex: 1; background: #1f1f1f; padding: 5px; border-radius: 5px; text-align: center; border-top: 2px solid #444; }
        .pct-val { font-size: 18px; font-weight: bold; color: #00e5ff; }

        /* ★十字キーを右下に「浮かせ」て固定 */
        .floating-ctrl { 
            position: fixed; 
            bottom: 20px; 
            right: 15px; 
            z-index: 200;
            display: grid; 
            grid-template-areas: ". up ." "left center right" ". down .";
            gap: 8px;
            background: rgba(26, 26, 26, 0.7); /* 少し透けさせる */
            padding: 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px); /* 背景をぼかして見やすく */
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .floating-ctrl button { 
            width: 55px; height: 55px; background: #333; color: white; border: 1px solid #666; 
            border-radius: 12px; cursor: pointer; font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .floating-ctrl button:active { background: #adff2f; color: #000; }

        .btn-center { grid-area: center; background: #222 !important; border: 1px solid #444; color: #888; font-size: 12px; flex-direction: column; }
        .mode-fast { border-color: #adff2f !important; color: #adff2f !important; }

        #active_indicator { color: #adff2f; font-weight: bold; font-size: 14px; margin: 2px 0; }
        #drop_area { width: 90%; height: 40px; border: 1px dashed #666; line-height: 40px; text-align: center; border-radius: 8px; font-size: 14px; margin: 5px auto; }
    </style>
</head>
<body>

<div id="header">
    <div id="active_indicator">画像を選択してください</div>
    <div id="drop_area" onclick="document.getElementById('file_input').click()">画像を選択</div>
    <input type="file" id="file_input" style="display:none" accept="image/*">
</div>

<div class="top-info">
    <div class="slider-row">
        <span>明るさ</span>
        <input type="range" id="bright_slider" min="0.5" max="2.0" step="0.05" value="1.1">
        <span id="bright_val">110%</span>
    </div>
    <div class="res-row">
        <div class="res-mini">LR <span class="pct-val" id="p_lr">--:--</span></div>
        <div class="res-mini">TB <span class="pct-val" id="p_tb">--:--</span></div>
    </div>
</div>

<div id="stage"><canvas id="cvs"></canvas></div>

<div class="floating-ctrl">
    <button style="grid-area: up" onclick="doMove(-1)">▲</button>
    <button style="grid-area: left" onclick="doMove(-1)">◀</button>
    <button id="mode_btn" class="btn-center" onclick="toggleMode()">
        <span id="mode_txt" style="font-size:16px;">1px</span>
        <span>MODE</span>
    </button>
    <button style="grid-area: right" onclick="doMove(1)">▶</button>
    <button style="grid-area: down" onclick="doMove(1)">▼</button>
</div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const slider = document.getElementById('bright_slider');
    const brightDisp = document.getElementById('bright_val');
    
    let img = new Image();
    let lines = { out_l:0, out_r:0, out_t:0, out_b:0, in_l:0, in_r:0, in_t:0, in_b:0 };
    const labelMap = { out_l:"外枠：左", out_r:"外枠：右", out_t:"外枠：上", out_b:"外枠：下", in_l:"絵：左", in_r:"絵：右", in_t:"絵：上", in_b:"絵：下" };
    let activeKey = 'in_l', isDrag = false, isFastMode = false;

    slider.oninput = () => {
        brightDisp.innerText = Math.round(slider.value * 100) + "%";
        cvs.style.filter = `brightness(${slider.value}) contrast(1.05)`;
    };

    document.getElementById('file_input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = ev => { img.src = ev.target.result; };
        r.readAsDataURL(file);
    };

    img.onload = () => {
        const scale = window.innerWidth / img.width;
        cvs.width = img.width * scale;
        cvs.height = img.height * scale;
        lines = { out_l:10, out_r:cvs.width-10, out_t:10, out_b:cvs.height-10, in_l:cvs.width*0.2, in_r:cvs.width*0.8, in_t:cvs.height*0.2, in_b:cvs.height*0.8 };
        document.getElementById('drop_area').innerText = "画像変更";
        cvs.style.filter = `brightness(${slider.value}) contrast(1.05)`;
        setInterval(draw, 30);
    };

    function toggleMode() {
        isFastMode = !isFastMode;
        document.getElementById('mode_btn').classList.toggle('mode-fast', isFastMode);
        document.getElementById('mode_txt').innerText = isFastMode ? "10px" : "1px";
    }

    function doMove(dir) {
        if(!activeKey) return;
        lines[activeKey] += (dir * (isFastMode ? 10 : 1));
    }

    function draw() {
        if(!img.src) return;
        ctx.clearRect(0,0,cvs.width, cvs.height);
        ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
        Object.keys(lines).forEach(key => {
            const val = lines[key];
            const isActive = (key === activeKey);
            ctx.beginPath();
            ctx.setLineDash(key.startsWith('out') ? [10, 5] : [5, 5]);
            ctx.strokeStyle = key.startsWith('out') ? '#00e5ff' : '#adff2f';
            ctx.lineWidth = isActive ? 3 : 1;
            ctx.globalAlpha = isActive ? 1.0 : 0.4;
            if(key.endsWith('_l') || key.endsWith('_r')) { ctx.moveTo(val, 0); ctx.lineTo(val, cvs.height); }
            else { ctx.moveTo(0, val); ctx.lineTo(cvs.width, val); }
            ctx.stroke();
        });
        calc();
    }

    function calc() {
        const pxPerMm = Math.min(cvs.width, cvs.height) / 63;
        const l = Math.abs(lines.in_l - lines.out_l)/pxPerMm, r = Math.abs(lines.out_r - lines.in_r)/pxPerMm;
        const t = Math.abs(lines.in_t - lines.out_t)/pxPerMm, b = Math.abs(lines.out_b - lines.in_b)/pxPerMm;
        const lp = Math.round(l/(l+r)*100)||50, tp = Math.round(t/(t+b)*100)||50;
        document.getElementById('p_lr').innerText = `${lp}:${100-lp}`;
        document.getElementById('p_tb').innerText = `${tp}:${100-tp}`;
        document.getElementById('active_indicator').innerText = labelMap[activeKey];
    }

    const startAction = (mx, my) => {
        let minDist = 40, found = null;
        Object.keys(lines).forEach(key => {
            const val = lines[key];
            const dist = (key.endsWith('_l') || key.endsWith('_r')) ? Math.abs(mx - val) : Math.abs(my - val);
            if(dist < minDist) { minDist = dist; found = key; }
        });
        if(found) activeKey = found;
    };

    cvs.addEventListener('touchstart', e => { 
        const r = cvs.getBoundingClientRect(); 
        startAction(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); 
        isDrag = true;
    });
    cvs.addEventListener('touchmove', e => {
        if(!isDrag) return;
        const r = cvs.getBoundingClientRect();
        lines[activeKey] = (activeKey.endsWith('_l') || activeKey.endsWith('_r')) ? (e.touches[0].clientX - r.left) : (e.touches[0].clientY - r.top);
        e.preventDefault();
    }, {passive: false});
    window.addEventListener('touchend', () => isDrag = false);
</script>
</body>
</html>
